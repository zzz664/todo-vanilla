<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 뭐하지?</title>
    <link rel="stylesheet" href="./index.css" />
    <script
      src="https://kit.fontawesome.com/0baea3085a.js"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <header id="appHeader">
      <a href="/" class="logo"><h1>TODO: 오늘 뭐하지?</h1></a>
    </header>
    <main id="appContent">
      <details id="todoInput" open>
        <summary class="todoInputSummary">할 일 추가하기</summary>
        <p class="todoInputDesc">
          할 일의 제목은 반드시 입력해야하며, 나머지는 선택사항입니다.
        </p>
        <form id="todoForm" method="POST">
          <fieldset id="todoFormFieldset">
            <input
              type="text"
              id="newTodoTitle"
              placeholder="새 할 일의 제목을 입력하세요." />
            <input
              type="text"
              id="newTodoDescription"
              placeholder="새 할 일의 설명을 입력하세요." />
            <div class="priorityWrap">
              <label for="newTodoPriority">우선도:</label>
              <select name="priority" id="newTodoPriority">
                <option value="HIGH">높음</option>
                <option value="MEDIUM" selected>중간</option>
                <option value="LOW">낮음</option>
              </select>
            </div>
            <div id="modifyBtnContainer" class="hidden">
              <button type="submit" id="applyModifyBtn">수정완료</button>
              <button type="button" id="cancelModifyBtn">수정취소</button>
            </div>
            <input type="date" name="dueDate" id="newTodoDueDate" />
            <button type="submit" id="submitTodoBtn">
              <i class="fa-solid fa-plus"></i>
            </button>
          </fieldset>
        </form>
      </details>
      <hr class="horizontalLine" />
      <ul id="todoList"></ul>
    </main>
    <div id="modal" class="hidden">
      <div class="modalBody">
        <h3 class="modalTitle">제목</h3>
        <pre class="modalContent">내용</pre>
        <button type="button" id="modalCloseBtn">닫기</button>
      </div>
    </div>
    <template id="unAuthWarn">
      <div class="requireLoginRegister">
        <div class="requiredWrap">
          <p>
            서비스를 이용하려면 로그인을 해야합니다.
            <a href="/login">> 로그인 하러가기</a>
          </p>
        </div>
        <div class="requiredWrap">
          <p>
            아직 계정이 없으신가요? <a href="/register">> 회원가입 하러가기</a>
          </p>
        </div>
      </div>
    </template>
    <template id="loadingTemplate">
      <li class="loading">할 일 목록 로딩중...</li>
    </template>
    <template id="emptyTemplate">
      <li class="emptyTodoList">할 일 목록이 비어있습니다.</li>
    </template>
    <script type="module" src="./index_refactor.js"></script>
  </body>
</html>
