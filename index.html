<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 뭐하지?</title>
    <link rel="stylesheet" href="./index.css" />
    <script type="module" src="./config.js"></script>
  </head>
  <body>
    <header id="appHeader">
      <a href="/" id="logo"><h1>TODO: 오늘 뭐하지?</h1></a>
      <div id="authBtnContainer">
        <a href="/login" id="loginPage">로그인</a>
        <a href="/register" id="registerPage">회원가입</a>
        <button id="logoutBtn" type="button" class="hidden">로그아웃</button>
      </div>
    </header>
    <main id="appContent"></main>
    <div id="home" class="">
      <form id="todoForm">
        <fieldset id="todoFormFieldset">
          <input
            type="text"
            id="newTodoTitle"
            placeholder="새 할 일의 제목을 입력하세요." />
          <input
            type="text"
            id="newTodoDesc"
            placeholder="새 할 일의 설명을 입력하세요." />
          <div class="priorityWrap">
            <label for="newTodoPriority">우선도</label>
            <select name="priority" id="newTodoPriority">
              <option value="HIGH">높음</option>
              <option value="MEDIUM">중간</option>
              <option value="LOW">낮음</option>
            </select>
          </div>
          <div id="modifyBtnContainer" class="hidden">
            <button type="submit" id="applyModifyBtn">수정완료</button>
            <button type="button" id="cancelModifyBtn">수정취소</button>
          </div>
          <input type="date" name="dueDate" id="newTodoDueDate" />
          <button type="submit" id="submitTodoBtn">+</button>
        </fieldset>
      </form>
      <ul id="todoList"></ul>
    </div>
    <div id="login" class="hidden">
      <form id="loginForm">
        <fieldset>
          <legend>로그인</legend>
          <input type="text" id="loginId" placeholder="아이디" />
          <input type="password" id="loginPassword" placeholder="비밀번호" />
        </fieldset>
        <button type="submit">로그인</button>
      </form>
    </div>
    <div id="register" class="hidden">
      <form id="registerForm">
        <fieldset>
          <legend>회원가입</legend>
          <input type="text" id="registerId" placeholder="아이디" />
          <input type="password" id="registerPassword" placeholder="비밀번호" />
          <input type="text" id="registerNickname" placeholder="닉네임" />
        </fieldset>
        <button type="submit">회원가입</button>
      </form>
    </div>
    <div id="modal" class="hidden">
      <div class="modalBody">
        <h3 class="modalTitle">제목</h3>
        <pre class="modalContent">내용</pre>
        <button type="button" id="modalCloseBtn">닫기</button>
      </div>
    </div>
    <script type="module" src="./index_refactor.js"></script>
  </body>
</html>
